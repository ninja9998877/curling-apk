name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 缓存 SDK/NDK，加速后续构建
      - name: 缓存 buildozer 全局目录
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-

      # 直接使用 Kivy 官方维护的 Docker 镜像打包，
      # 镜像内 Java/NDK/SDK/Cython 版本均已由官方对齐，避免手动搭环境的工具链冲突。
      - name: 使用官方 buildozer 镜像打包 APK
        run: |
          docker run --rm \
            -u root \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            -v "${HOME}/.buildozer":/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: 修正产物权限
        if: always()
        run: sudo chown -R $USER:$USER "${{ github.workspace }}/bin" || true

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: curling-apk
          path: bin/*.apk
          if-no-files-found: error
